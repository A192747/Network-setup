version: "3.8"

services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped

    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf

    ports:
      - "5055:53/tcp"
      - "5055:53/udp"
      - "8000:80/tcp"
      - "3000:3000/tcp"

    environment:
      - TZ=Europe/Moscow
